<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Premium Image Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-background"></div>

    <nav class="navbar">
        <div class="logo">
            <span class="material-symbols-outlined icon-logo">photo_auto_merge</span>
            <h1>Lumina</h1>
        </div>
        <p class="tagline">Studio-Grade Image Editor</p>
    </nav>

    <main class="container">

        <section class="editor-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <div class="placeholder" id="placeholder">
                    <span class="material-symbols-outlined">add_photo_alternate</span>
                    <p>Upload an image to start editing</p>
                </div>
                <img id="source-image" style="display: none;" crossorigin="anonymous">
                <canvas id="canvas"></canvas>
            </div>

            <div class="actions">
                <div class="action-btn upload-btn">
                    <label for="upload">
                        <span class="material-symbols-outlined">upload_file</span>
                        Upload Image
                    </label>
                    <input type="file" id="upload" accept="image/*">
                </div>
                <button class="action-btn download-btn" id="download" disabled>
                    <span class="material-symbols-outlined">download</span>
                    Download
                </button>
                <button class="action-btn reset-btn" id="reset" disabled>
                    <span class="material-symbols-outlined">restart_alt</span>
                    Reset Filters
                </button>
            </div>
        </section>

        <aside class="sidebar">
            <h2>Adjustments</h2>

            <div class="filters-list">
                <div class="filter-group">
                    <div class="filter-info">
                        <label for="saturate">Saturation</label>
                        <span class="value-display" id="saturate-val">100%</span>
                    </div>
                    <input type="range" id="saturate" min="0" max="200" value="100">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="contrast">Contrast</label>
                        <span class="value-display" id="contrast-val">100%</span>
                    </div>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="brightness">Brightness</label>
                        <span class="value-display" id="brightness-val">100%</span>
                    </div>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="sepia">Sepia</label>
                        <span class="value-display" id="sepia-val">0%</span>
                    </div>
                    <input type="range" id="sepia" min="0" max="200" value="0">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="grayscale">Grayscale</label>
                        <span class="value-display" id="grayscale-val">0</span>
                    </div>
                    <input type="range" id="grayscale" step="0.1" min="0" max="1" value="0">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="blur">Blur</label>
                        <span class="value-display" id="blur-val">0px</span>
                    </div>
                    <input type="range" id="blur" step="0.1" min="0" max="10" value="0">
                </div>

                <div class="filter-group">
                    <div class="filter-info">
                        <label for="hue-rotate">Hue Rotate</label>
                        <span class="value-display" id="hue-rotate-val">0deg</span>
                    </div>
                    <input type="range" id="hue-rotate" min="0" max="360" value="0">
                </div>
            </div>
        </aside>

    </main>

    <script src="script.js"></script>
</body>

</html>
